<svg width="700" height="320" viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="10x10 low-rank matrix factorization (compact)">
  <defs>
    <style>
      .txt { font-family: Arial, Helvetica, sans-serif; fill: #111; }
      .label { font-size: 24px; font-weight: 600; }
      .sub { font-size: 16px; }
      .box { fill: none; stroke: #222; stroke-width: 2; }
      .thin { stroke: #aaa; stroke-width: 0.8; }
      .accent { fill: #eef4ff; stroke: #222; stroke-width: 2; }
    </style>
  </defs>

  <!-- B -->
  <rect x="80" y="60" width="60" height="200" class="accent"/>
  <text x="110" y="285" text-anchor="middle" class="txt label">B</text>
  <text x="110" y="50" text-anchor="middle" class="txt sub">10×3</text>

  <!-- B grid -->
  <line x1="100" y1="60" x2="100" y2="260" class="thin"/>
  <line x1="120" y1="60" x2="120" y2="260" class="thin"/>
  <line x1="80" y1="80" x2="140" y2="80" class="thin"/>
  <line x1="80" y1="100" x2="140" y2="100" class="thin"/>
  <line x1="80" y1="120" x2="140" y2="120" class="thin"/>
  <line x1="80" y1="140" x2="140" y2="140" class="thin"/>
  <line x1="80" y1="160" x2="140" y2="160" class="thin"/>
  <line x1="80" y1="180" x2="140" y2="180" class="thin"/>
  <line x1="80" y1="200" x2="140" y2="200" class="thin"/>
  <line x1="80" y1="220" x2="140" y2="220" class="thin"/>
  <line x1="80" y1="240" x2="140" y2="240" class="thin"/>

  <!-- Dot -->
  <text x="155" y="165" class="txt label">·</text>

  <!-- A -->
  <rect x="180" y="130" width="200" height="60" class="accent"/>
  <text x="280" y="215" text-anchor="middle" class="txt label">A</text>
  <text x="280" y="120" text-anchor="middle" class="txt sub">3×10</text>

  <!-- A grid -->
  <line x1="200" y1="130" x2="200" y2="190" class="thin"/>
  <line x1="220" y1="130" x2="220" y2="190" class="thin"/>
  <line x1="240" y1="130" x2="240" y2="190" class="thin"/>
  <line x1="260" y1="130" x2="260" y2="190" class="thin"/>
  <line x1="280" y1="130" x2="280" y2="190" class="thin"/>
  <line x1="300" y1="130" x2="300" y2="190" class="thin"/>
  <line x1="320" y1="130" x2="320" y2="190" class="thin"/>
  <line x1="340" y1="130" x2="340" y2="190" class="thin"/>
  <line x1="360" y1="130" x2="360" y2="190" class="thin"/>

  <line x1="180" y1="150" x2="380" y2="150" class="thin"/>
  <line x1="180" y1="170" x2="380" y2="170" class="thin"/>

  <!-- Equals -->
  <text x="400" y="165" class="txt label">=</text>

  <!-- ΔW -->
  <rect x="440" y="60" width="200" height="200" class="box"/>
  <text x="540" y="285" text-anchor="middle" class="txt label">ΔW</text>
  <text x="540" y="50" text-anchor="middle" class="txt sub">10×10</text>

  <!-- ΔW grid -->
  <line x1="460" y1="60" x2="460" y2="260" class="thin"/>
  <line x1="480" y1="60" x2="480" y2="260" class="thin"/>
  <line x1="500" y1="60" x2="500" y2="260" class="thin"/>
  <line x1="520" y1="60" x2="520" y2="260" class="thin"/>
  <line x1="540" y1="60" x2="540" y2="260" class="thin"/>
  <line x1="560" y1="60" x2="560" y2="260" class="thin"/>
  <line x1="580" y1="60" x2="580" y2="260" class="thin"/>
  <line x1="600" y1="60" x2="600" y2="260" class="thin"/>
  <line x1="620" y1="60" x2="620" y2="260" class="thin"/>

  <line x1="440" y1="80" x2="640" y2="80" class="thin"/>
  <line x1="440" y1="100" x2="640" y2="100" class="thin"/>
  <line x1="440" y1="120" x2="640" y2="120" class="thin"/>
  <line x1="440" y1="140" x2="640" y2="140" class="thin"/>
  <line x1="440" y1="160" x2="640" y2="160" class="thin"/>
  <line x1="440" y1="180" x2="640" y2="180" class="thin"/>
  <line x1="440" y1="200" x2="640" y2="200" class="thin"/>
  <line x1="440" y1="220" x2="640" y2="220" class="thin"/>
  <line x1="440" y1="240" x2="640" y2="240" class="thin"/>
</svg>